# Generates a contribution-graph snake animation (light + dark variants,
# obsidian/gold palette) and publishes the SVGs to the `output` branch.
# The branch is created automatically on the first run; the README embeds
# the files from raw.githubusercontent.com/aouellets/aouellets/output/.

name: snake

on:
  schedule:
    - cron: "0 5 * * *" # daily, 05:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: aouellets
          outputs: |
            dist/github-snake.svg?color_snake=#0a0a0a&color_dots=#ebedf0,#e3d49a,#c9a636,#9c7f22,#6b5614
            dist/github-snake-dark.svg?color_snake=#d4af37&color_dots=#161b22,#3d3110,#6e581a,#9c7c25,#c9a12e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
